<!DOCTYPE html>
<html>
    <head>
        <style>
      *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }
        .video-bg{
          position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            object-fit: cover;
            z-index: -1;
            margin-top:130px;
        }
            .navbar{
                display:flex;
                gap: 200px;
                background-color: rgba(245, 245, 220, 0.836) ;
                align-items: center;
                padding: 20px 50px;
                position: relative;
            }
            .menu{
                display: flex;
                list-style: none;
                gap: 100px;
                padding-top: 15px;
                padding-right: 10px;
            }
            .menu li{
            cursor: pointer;
            font-size: 18px;
            }
            .main{
            height: 60vh;
           
            background-size: cover;
            background-position: center;

            display: flex;
            align-items: center;

            color: white;
            padding-left: 80px;
           }
           .main-text h1{
            font-size: 70px;
            margin-bottom: 20px;
           }
           .main-text p{
            font-size: 24px;
            width: 800px;
            margin-bottom: 30px;
           }
           .btn{
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background-color: cyan;
            cursor: pointer;
            }   
            .logo{
                font-size: 32px;
                color: rgba(0, 0, 255, 0.799);
            }
            .slideshow-container{
              text-align:center;
              padding:50px;
              background:white;
              margin: 100px auto 0;

              display: flex;
              flex-direction: column;
              align-items: center;
            }
            .heading{
              margin-bottom:10px;
              text-align: center;
            }
            .heading h1{
              font-size: 35px;
            }
            .slides-row{
              display: flex;
              justify-content: center;
              align-items: center;
              gap: 40px;
              margin-top: 50px;
            }
            .myslides{
              justify-content:center;
              align-items:center;
              animation: scroll 7s linear infinite;
            }
            .myslides img{
              width:180px;
              height:120px;
              object-fit:contain;
            }
            .slideshow-container button{
              margin-top:40px;
              padding:15px 40px;
              border:none;
              border-radius:30px;
              background:#12395b;
              color:white;
              font-size:20px;
            }
            @keyframes scroll{
              0%{
                transform:translateX(0);
              }
              100%{
                transform:translateX(-50%);
              }
            }
            .footer{
               margin-left: 10px;
               margin-bottom: 50px;
               text-align: center;
            }
            .footer h1{
              font-size: 32px;
              margin-bottom: 20px;
            }
            .footer p{
              font-size: 20px;
              margin: 10px 0;
            }
            .footer a{
              color:black;
              text-decoration: none;
            }
            .footer a:hover{
              color: rgba(0, 255, 255, 0.348);
            }
        </style>
        </head>
